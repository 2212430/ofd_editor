server:
  port: 8080
  tomcat:
    max-http-form-post-size: 100MB
    max-swallow-size: 100MB

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  codec:
    max-in-memory-size: 100MB
  web:
    resources:
      add-mappings: false

logging:
  level:
    com.ofdeditor: DEBUG