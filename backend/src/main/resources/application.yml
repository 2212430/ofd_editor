server:
  port: 8080
  tomcat:
    max-http-form-post-size: 100MB
    max-swallow-size: 100MB

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  codec:
    max-in-memory-size: 100MB
  web:
    resources:
      add-mappings: false

logging:
  level:
    com.ofdeditor: DEBUG

# PDF → Word（pdf2docx，需 Python: pip install -r backend/requirements-pdf2docx.txt）
ofd:
  pdf2docx:
    python: python
    # script-path: D:/ofd-editor/backend/tools/pdf_to_docx.py
    timeout-seconds: 600
  # PDF → PPT（PyMuPDF + python-pptx，需 pip install -r backend/requirements-pdf2pptx.txt）
  pdf2pptx:
    python: python
    # script-path: D:/ofd-editor/backend/tools/pdf_to_pptx.py
    timeout-seconds: 900
    resolution-dpi: 150